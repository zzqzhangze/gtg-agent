<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTG Agent</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <button id="sidebar-toggle" class="icon-btn" title="切换会话列表" aria-label="切换会话列表">☰</button>
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:1em;height:1em"><rect x="3" y="6" width="18" height="14" rx="3"/><circle cx="9" cy="10" r="1.5"/><circle cx="15" cy="10" r="1.5"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="3" y1="3" x2="5" y2="6"/><line x1="21" y1="3" x2="19" y2="6"/></svg> GTG Agent</div>
    </div>
    <div class="header-actions">
      <button id="mcp-btn" class="icon-btn" title="MCP 工具管理" aria-label="MCP 工具管理"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:20px;height:20px"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a5.5 5.5 0 0 1-7.52 7.53l-6.5 6.5a2.1 2.1 0 1 1-3-3l6.5-6.5a5.5 5.5 0 0 1 7.52-7.53l-3.77 3.77Z"/></svg></button>
      <button id="theme-toggle" class="icon-btn" title="切换暗色模式" aria-label="切换暗色模式"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:20px;height:20px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      <button id="new-session" class="new-session-btn" title="新会话" aria-label="开始新会话">＋<span class="btn-label"> 新会话</span></button>
    </div>
  </header>

  <!-- Main Area (sidebar + chat) -->
  <div id="main">
    <!-- Sidebar -->
    <aside id="sidebar" class="collapsed">
      <div class="sidebar-header">
        <span class="sidebar-title">会话历史</span>
        <button id="new-session-sidebar" class="new-session-btn sidebar" title="新建会话">＋ 新会话</button>
      </div>
      <div id="session-list"></div>
    </aside>

    <!-- Chat Panel -->
    <div id="chat-panel">
      <!-- Chat Container -->
      <main id="chat-container">
        <div id="messages"></div>
        <div id="welcome">
          <div class="welcome-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:56px;height:56px"><rect x="3" y="6" width="18" height="14" rx="3"/><circle cx="9" cy="10" r="1.5"/><circle cx="15" cy="10" r="1.5"/><line x1="9" y1="14" x2="15" y2="14"/><line x1="3" y1="3" x2="5" y2="6"/><line x1="21" y1="3" x2="19" y2="6"/></svg></div>
          <h1>GTG Agent</h1>
          <p>开始对话，或试试以下示例：</p>
          <div class="welcome-suggestions">
            <button class="suggestion-chip" data-prompt="帮我分析这份数据"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:1em;height:1em;margin-right:4px"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg> 分析数据</button>
            <button class="suggestion-chip" data-prompt="读取并总结一个文件"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:1em;height:1em;margin-right:4px"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2Z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> 总结文件</button>
            <button class="suggestion-chip" data-prompt="帮我写一段 Python 代码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:1em;height:1em;margin-right:4px"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> 写代码</button>
          </div>
        </div>
        <div id="loading" class="hidden">
          <div id="execution-log"></div>
        </div>
      </main>

      <!-- File Preview Bar -->
      <div id="file-bar" class="hidden">
        <div id="file-list"></div>
      </div>

      <!-- Input Area -->
      <footer id="input-area">
        <button id="attach-btn" class="icon-btn" title="上传文件" aria-label="上传文件"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:20px;height:20px"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
        <input type="file" id="file-input" multiple hidden>
        <textarea id="message-input" rows="1" placeholder="输入消息..." maxlength="10000" aria-label="消息输入"></textarea>
        <button id="send-btn" title="发送" aria-label="发送消息">➤</button>
      </footer>
    </div>
  </div>

  <!-- MCP 侧边面板 -->
  <div id="mcp-panel" class="mcp-panel">
    <div class="mcp-drag-handle" title="拖动调整宽度"></div>
    <div class="mcp-panel-header">
      <h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:1em;height:1em;margin-right:4px"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a5.5 5.5 0 0 1-7.52 7.53l-6.5 6.5a2.1 2.1 0 1 1-3-3l6.5-6.5a5.5 5.5 0 0 1 7.52-7.53l-3.77 3.77Z"/></svg> MCP 工具</h2>
      <button id="mcp-panel-close" class="icon-btn" title="关闭">✕</button>
    </div>
    <div class="mcp-panel-body">
      <!-- 连接区 -->
      <div class="mcp-connect-row">
        <input id="mcp-url-input" placeholder="粘贴 MCP 端点 URL，回车连接" />
        <select id="mcp-mode-select">
          <option value="auto">自动检测</option>
          <option value="streamable-http">HTTP</option>
          <option value="sse">SSE</option>
        </select>
        <button id="mcp-connect-btn">连接</button>
      </div>
      <div class="mcp-hint-bar">支持连接多个 Server，URL 输入框始终可用</div>
      <div id="mcp-toast"></div>

      <!-- Server 列表 -->
      <div id="mcp-server-area"></div>

      <!-- 空状态 -->
      <div id="mcp-empty" class="mcp-empty-state">
        <div class="mcp-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:40px;height:40px"><path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a6 6 0 0 1-12 0v-5h12Z"/></svg></div>
        <p>还没有连接的 MCP Server</p>
        <p class="mcp-hint">贴入 MCP 端点 URL 即可自动连接</p>
      </div>
    </div>
  </div>

  <script src="/static/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
