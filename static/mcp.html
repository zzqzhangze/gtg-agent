<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP 工具管理 — GTG Agent</title>
<link rel="stylesheet" href="/static/style.css">
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #1c2a4a;
  --border: #2a3a5c;
  --text: #e0e0e0;
  --text-dim: #8899aa;
  --accent: #4fc3f7;
  --accent-hover: #29b6f6;
  --green: #66bb6a;
  --red: #ef5350;
  --orange: #ffa726;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
h1, h2, h3 { margin: 0 0 16px 0; font-weight: 600; }
h1 { font-size: 1.5rem; }
h2 { font-size: 1.2rem; color: var(--accent); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
th { color: var(--text-dim); font-weight: 500; font-size: 0.85rem; text-transform: uppercase; }
td { font-size: 0.9rem; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { background: var(--red); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 4px 10px; font-size: 0.8rem; }
.actions { display: flex; gap: 6px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 500; }
.badge-on { background: #1b5e20; color: var(--green); }
.badge-off { background: #4a1414; color: var(--red); }
.empty { color: var(--text-dim); text-align: center; padding: 40px; }
.error-msg { background: rgba(239,83,80,0.15); border: 1px solid var(--red); border-radius: 6px; padding: 10px 14px; margin: 10px 0; color: var(--red); font-size: 0.85rem; }
.success-msg { background: rgba(102,187,106,0.15); border: 1px solid var(--green); border-radius: 6px; padding: 10px 14px; margin: 10px 0; color: var(--green); font-size: 0.85rem; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.dialog { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 460px; max-width: 90vw; }
.dialog h3 { margin-bottom: 20px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 4px; }
.form-row input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.9rem; box-sizing: border-box; }
.form-row input:focus { outline: none; border-color: var(--accent); }
.dialog-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;width:1em;height:1em;margin-right:4px"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a5.5 5.5 0 0 1-7.52 7.53l-6.5 6.5a2.1 2.1 0 1 1-3-3l6.5-6.5a5.5 5.5 0 0 1 7.52-7.53l-3.77 3.77Z"/></svg> MCP 工具管理</h1>
  <button class="btn btn-primary" onclick="showAddDialog()">+ 添加 Server</button>
</div>

<div id="messages"></div>

<div class="card">
  <h2>MCP Servers</h2>
  <table>
    <thead><tr><th>名称</th><th>URL</th><th>超时</th><th>状态</th><th>操作</th></tr></thead>
    <tbody id="server-list"><tr><td colspan="5" class="empty">加载中...</td></tr></tbody>
  </table>
</div>

<div class="card">
  <h2>已发现工具 <span id="tool-count" style="font-weight:400;color:var(--text-dim);font-size:0.9rem"></span></h2>
  <table>
    <thead><tr><th>Server</th><th>工具名</th><th>描述</th><th>启用</th></tr></thead>
    <tbody id="tool-list"><tr><td colspan="4" class="empty">加载中...</td></tr></tbody>
  </table>
</div>

<!-- Add/Edit Dialog -->
<div id="dialog" class="overlay" style="display:none" onclick="if(event.target===this)closeDialog()">
  <div class="dialog">
    <h3 id="dialog-title">添加 MCP Server</h3>
    <div class="form-row">
      <label>名称</label>
      <input id="f-name" placeholder="例如: local-mcp" />
    </div>
    <div class="form-row">
      <label>URL (SSE 端点)</label>
      <input id="f-url" placeholder="例如: http://localhost:3001/sse" />
    </div>
    <div class="form-row">
      <label>超时 (秒)</label>
      <input id="f-timeout" type="number" value="60" />
    </div>
    <div class="dialog-actions">
      <button class="btn btn-outline" onclick="closeDialog()">取消</button>
      <button class="btn btn-primary" id="dialog-save" onclick="saveServer()">保存</button>
    </div>
  </div>
</div>

<script src="/static/mcp.js"></script>
</body>
</html>
