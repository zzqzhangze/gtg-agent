version: "3.8"

services:
  opensandbox-server:
    image: opensandbox/server:latest
    container_name: gtg-sandbox
    restart: unless-stopped
    ports:
      # 主机 8080 → 容器 8090（与 config.env 默认 SANDBOX_API_URL 一致）
      - "8080:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/var/lib/opensandbox
    environment:
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
      OPENSANDBOX_SERVER_API_KEY: my-secret-api-key-007
    configs:
      - source: opensandbox-config
        target: /etc/opensandbox/config.toml

configs:
  opensandbox-config:
    content: |
      [server]
      host = "0.0.0.0"
      port = 8090

      [log]
      level = "INFO"

      [runtime]
      type = "docker"
      execd_image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/execd:v1.0.13"

      [egress]
      image = "opensandbox/egress:v1.0.8"

      [docker]
      network_mode = "bridge"
      host_ip = "host.docker.internal"

volumes:
  sandbox-data:
