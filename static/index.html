<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Deep Agent</title>
  <link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <button id="sidebar-toggle" class="icon-btn" title="切换会话列表" aria-label="切换会话列表">☰</button>
      <div class="logo">🤖 My Deep Agent</div>
    </div>
    <div class="header-actions">
      <button id="mcp-btn" class="icon-btn" title="MCP 工具管理" aria-label="MCP 工具管理">🔧</button>
      <button id="theme-toggle" class="icon-btn" title="切换暗色模式" aria-label="切换暗色模式">🌙</button>
      <button id="new-session" class="new-session-btn" title="新会话" aria-label="开始新会话">＋<span class="btn-label"> 新会话</span></button>
    </div>
  </header>

  <!-- Main Area (sidebar + chat) -->
  <div id="main">
    <!-- Sidebar -->
    <aside id="sidebar" class="collapsed">
      <div class="sidebar-header">
        <span class="sidebar-title">会话历史</span>
        <button id="new-session-sidebar" class="new-session-btn sidebar" title="新建会话">＋ 新会话</button>
      </div>
      <div id="session-list"></div>
    </aside>

    <!-- Chat Panel -->
    <div id="chat-panel">
      <!-- Chat Container -->
      <main id="chat-container">
        <div id="messages"></div>
        <div id="welcome">
          <div class="welcome-icon">🤖</div>
          <h1>My Deep Agent</h1>
          <p>开始对话，或试试以下示例：</p>
          <div class="welcome-suggestions">
            <button class="suggestion-chip" data-prompt="帮我分析这份数据">📊 分析数据</button>
            <button class="suggestion-chip" data-prompt="读取并总结一个文件">📝 总结文件</button>
            <button class="suggestion-chip" data-prompt="帮我写一段 Python 代码">💻 写代码</button>
          </div>
        </div>
        <div id="loading" class="hidden">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
          <span class="loading-text">思考中...</span>
        </div>
      </main>

      <!-- File Preview Bar -->
      <div id="file-bar" class="hidden">
        <div id="file-list"></div>
      </div>

      <!-- Input Area -->
      <footer id="input-area">
        <button id="attach-btn" class="icon-btn" title="上传文件" aria-label="上传文件">📎</button>
        <input type="file" id="file-input" multiple hidden>
        <textarea id="message-input" rows="1" placeholder="输入消息..." maxlength="10000" aria-label="消息输入"></textarea>
        <button id="send-btn" title="发送" aria-label="发送消息">➤</button>
      </footer>
    </div>
  </div>

  <!-- MCP 侧边面板 -->
  <div id="mcp-panel" class="mcp-panel">
    <div class="mcp-drag-handle" title="拖动调整宽度"></div>
    <div class="mcp-panel-header">
      <h2>🔧 MCP 工具</h2>
      <button id="mcp-panel-close" class="icon-btn" title="关闭">✕</button>
    </div>
    <div class="mcp-panel-body">
      <!-- 连接区 -->
      <div class="mcp-connect-row">
        <input id="mcp-url-input" placeholder="粘贴 MCP 端点 URL，回车连接" />
        <select id="mcp-mode-select">
          <option value="auto">自动检测</option>
          <option value="streamable-http">HTTP</option>
          <option value="sse">SSE</option>
        </select>
        <button id="mcp-connect-btn">连接</button>
      </div>
      <div class="mcp-hint-bar">支持连接多个 Server，URL 输入框始终可用</div>
      <div id="mcp-toast"></div>

      <!-- Server 列表 -->
      <div id="mcp-server-area"></div>

      <!-- 空状态 -->
      <div id="mcp-empty" class="mcp-empty-state">
        <div class="mcp-empty-icon">🔌</div>
        <p>还没有连接的 MCP Server</p>
        <p class="mcp-hint">贴入 MCP 端点 URL 即可自动连接</p>
      </div>
    </div>
  </div>

  <script src="/static/marked.min.js"></script>
  <script src="/static/app.js?v=12"></script>
</body>
</html>
